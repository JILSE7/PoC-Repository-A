name: Sync folders to PoC-Repository-B

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "domain/**"

jobs:
  sync-docs:
    name: Sync /docs → module/docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PoC-Repository-A (monorepo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push /docs to PoC-Repository-B/module/docs
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.SYNC_TOKEN }}
        with:
          source-directory: "docs"
          destination-github-username: "JILSE7"
          destination-repository-name: "PoC-Repository-B"
          target-directory: "module/docs"
          target-branch: master
          commit-message: "sync(docs): ${{ github.event.head_commit.message }}"

  sync-domain:
    name: Sync /domain → module/domain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PoC-Repository-A (monorepo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push /domain to PoC-Repository-B/module/domain
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.SYNC_TOKEN }}
        with:
          source-directory: "domain"
          destination-github-username: "JILSE7"
          destination-repository-name: "PoC-Repository-B"
          target-directory: "module/domain"
          target-branch: master
          commit-message: "sync(domain): ${{ github.event.head_commit.message }}"